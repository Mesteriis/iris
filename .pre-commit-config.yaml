#default_stages: [manual]
#minimum_pre_commit_version: "4.0.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff-check
        name: backend ruff
        args: [--config=backend/pyproject.toml]
        files: ^backend/.*\.py$

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        name: backend pyupgrade
        args: [--py314-plus]
        exclude: ^backend/.*\.py$
        files: ^backend/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: backend mypy
        entry: env
        args: [PYTHONPATH=backend, MYPYPATH=backend, uv, run, --project, backend, --group, dev, mypy, --config-file, backend/pyproject.toml, -p, src]
        pass_filenames: false
        files: ^backend/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: backend bandit
        entry: uv run --project backend --group dev bandit
        args: [-q, -r, backend/src]
        pass_filenames: false
        files: ^backend/.*\.py$

  - repo: https://github.com/seddonym/import-linter
    rev: v2.9
    hooks:
      - id: import-linter
        name: backend import-linter
        entry: env
        args: [PYTHONPATH=backend, uv, run, --project, backend, --group, dev, lint-imports, --config, backend/pyproject.toml, --no-cache]
        pass_filenames: false
        files: ^backend/(pyproject\.toml|src/.*\.py)$

  - repo: https://github.com/fpgmaas/deptry
    rev: 0.9.0
    hooks:
      - id: deptry
        name: backend deptry
        entry: uv run --project backend --group dev deptry
        args: [backend/src, --config, backend/pyproject.toml, --per-rule-ignores, DEP002=greenlet|psycopg]
        pass_filenames: false
        files: ^backend/(pyproject\.toml|uv\.lock|src/.*\.py)$

  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        name: backend pip-audit
        entry: scripts/run_backend_pip_audit.sh
        pass_filenames: false
        files: ^backend/(pyproject\.toml|uv\.lock)$

  - repo: https://github.com/guilatrova/tryceratops
    rev: v2.4.1
    hooks:
      - id: tryceratops
        name: backend tryceratops
        entry: uv run --project backend --group dev tryceratops
        args: [-i, TRY003, -i, TRY300, -i, TRY301, -i, TRY101, -i, TRY203, -i, TRY401, backend/src]
        pass_filenames: false
        files: ^backend/src/.*\.py$

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.9.1
    hooks:
      - id: vulture
        name: backend vulture
        entry: uv run --project backend --group dev vulture
        args: [backend/src, --exclude, backend/src/migrations/, --min-confidence, "80"]
        pass_filenames: false
        files: ^backend/src/.*\.py$

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        name: backend xenon
        entry: uv run --project backend --group dev xenon
        args: [--max-absolute, F, --max-modules, D, --max-average, A, backend/src]
        pass_filenames: false
        files: ^backend/src/.*\.py$

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.99.0
    hooks:
      - id: semgrep
        name: backend semgrep
        entry: uv run --project backend --group dev semgrep
        args: [scan, --config, p/python, --config, p/secrets, --error, --exclude, backend/src/migrations, backend/src]
        pass_filenames: false
        files: ^backend/src/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.9.1
    hooks:
      - id: eslint
        name: frontend vue-tsc
        entry: npm
        args: [--prefix, frontend, run, lint]
        pass_filenames: false
        types: [file]
        files: ^frontend/

      - id: eslint
        name: frontend npm audit
        entry: npm
        args: [--prefix, frontend, audit, --audit-level=moderate]
        pass_filenames: false
        types: [file]
        files: ^frontend/(package\.json|package-lock\.json)$

  - repo: local
    hooks:
      - id: eradicate
        name: backend eradicate
        entry: uv run --project backend --group dev eradicate
        language: system
        args: [--recursive, backend/src]
        pass_filenames: false
        files: ^backend/src/.*\.py$
