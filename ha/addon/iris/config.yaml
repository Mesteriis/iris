name: IRIS
version: "0.1.0"
slug: iris
description: IRIS backend service with embedded TaskIQ worker
startup: services
boot: auto
init: false
arch:
  - amd64
  - aarch64
ports:
  8000/tcp: 8000
options:
  database_url: postgresql+psycopg://iris:iris@db:5432/iris
  api_port: 8000
schema:
  database_url: str
  api_port: int
