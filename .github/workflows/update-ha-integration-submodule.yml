name: Update HA Integration Submodule

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit from ha-integration-iris to pin"
        required: true
        default: "main"

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.2"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Update ha/integration checkout and compatibility pin
        run: python scripts/update_ha_integration_submodule.py --ref "${{ inputs.ref }}"

      - name: Validate integration contract metadata
        run: python scripts/check_ha_integration_contract.py

      - name: Install integration dependencies
        run: uv sync --project ha/integration --group dev

      - name: Install backend dependencies
        run: uv sync --project backend --group dev

      - name: Lint integration
        run: |
          cd ha/integration
          uv run ruff check custom_components tests

      - name: Test integration
        run: |
          cd ha/integration
          uv run pytest tests -q

      - name: Test shared backend contract fixtures
        run: |
          cd backend
          uv run pytest tests/apps/integrations/test_ha_contract_fixtures.py -q

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-ha-integration-${{ github.run_id }}
          commit-message: "chore: bump ha/integration submodule"
          title: "chore: bump ha/integration submodule"
          body: |
            Automated update of the `ha/integration` submodule and `ha/compatibility.yaml` pin.

            Requested ref: `${{ inputs.ref }}`
          add-paths: |
            ha/integration
            ha/compatibility.yaml
