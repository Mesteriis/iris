site_name: IRIS
site_description: Event-driven market intelligence platform documentation
site_url: https://mesteriis.github.io/iris/
repo_url: https://github.com/Mesteriis/iris
repo_name: Mesteriis/iris
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/img/logo.png
  favicon: assets/img/logo.png
  font:
    text: Manrope
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mesteriis/iris
      name: GitHub repository

